<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú de Ejercicios</title>
</head>
<body>

<h2>📘 Menú de Ejercicios</h2>

<select id="menu" onchange="mostrarEjercicio()">
  <option value="">-- Selecciona una opción --</option>
  <option value="suma">Suma</option>
  <option value="par">Par o impar</option>
  <option value="tabla">Tabla de multiplicar</option>
  <option value="edad">Mayor de edad</option>
  <option value="ciclo">Ciclo</option>
</select>

<hr>

<div id="suma" class="opcion" style="display:none;">
  <h3>Suma</h3>
  <input id="num1" type="number" placeholder="Número 1">
  <input id="num2" type="number" placeholder="Número 2">
  <button onclick="sumarUI()">Sumar</button>
  <p id="resSuma"></p>
</div>

<div id="par" class="opcion" style="display:none;">
  <h3>Par o impar</h3>
  <input id="numPI" type="number" placeholder="Número">
  <button onclick="parImparUI()">Verificar</button>
  <p id="resPI"></p>
</div>

<div id="tabla" class="opcion" style="display:none;">
  <h3>Tabla de multiplicar</h3>
  <input id="numTabla" type="number" placeholder="Número">
  <button onclick="tablaUI()">Generar</button>
  <pre id="resTabla"></pre>
</div>

<div id="edad" class="opcion" style="display:none;">
  <h3>Mayor de edad</h3>
  <input id="edadInput" type="number" placeholder="Edad">
  <button onclick="mayorEdadUI()">Verificar</button>
  <p id="resEdad"></p>
</div>

<div id="ciclo" class="opcion" style="display:none;">
  <h3>Ciclo</h3>
  <input id="inicio" type="number" placeholder="Inicio">
  <input id="fin" type="number" placeholder="Fin">
  <button onclick="cicloUI()">Ejecutar</button>
  <pre id="resCiclo"></pre>
</div>

<script src="./ejercicios.js"></script>

</body>
</html>
